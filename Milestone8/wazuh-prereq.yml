# Playbook used to provision rocky hosts
- name: wazuh server pre-setup
  hosts: wazuh_server

  tasks:
    - name: change hostname
      hostname:
        name: "{{ hostname }}"
      become: yes

    - name: update hosts file
      lineinfile:
        path: /etc/hosts
        line: '127.0.1.1 {{ hostname }}'
      become: yes

    - name: set static ip
      nmcli:
        conn_name: "{{ device }}"
        ip4: "{{ lan_ip }}/24"
        gw4: "{{ gateway }}"
        state: present
        type: ethernet
        dns4:
          - "{{ name_server }}"
          - "{{ gateway }}"
        method4: manual
      become: yes

    - name: bounce box and restart
      shell: "sleep 5 && shutdown -r now"
      become: yes
      async: 1
      poll: 0

